<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GuideAI — Agent Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:         #0d0d0f;
    --surface:    #16161a;
    --surface2:   #1e1e24;
    --border:     #2a2a32;
    --accent:     #7c6af7;
    --accent-dim: rgba(124,106,247,.15);
    --agent:      #f59e0b;
    --agent-dim:  rgba(245,158,11,.12);
    --text:       #e8e8f0;
    --muted:      #6b6b80;
    --success:    #4ade80;
    --error:      #f87171;
    --warn:       #fbbf24;
    --mono:       'DM Mono', monospace;
    --display:    'Syne', sans-serif;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 32px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-logo {
    font-family: var(--display); font-size: 1.2rem; font-weight: 800;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .agent-badge {
    font-size: .7rem; padding: 3px 10px; border-radius: 10px;
    background: var(--agent-dim); border: 1px solid rgba(245,158,11,.3);
    color: var(--agent);
  }
  .online-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); animation: pulse 2s infinite;
    display: inline-block;
  }
  .online-label { font-size: .72rem; color: var(--muted); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .user-chip {
    font-size: .72rem; color: var(--muted); background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px;
  }
  .logout-btn {
    padding: 7px 14px; background: transparent; border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-family: var(--mono);
    font-size: .75rem; cursor: pointer; transition: all .2s; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .logout-btn:hover { border-color: var(--error); color: var(--error); }

  /* ── INCOMING CALL BANNER ── */
  .incoming-banner {
    display: none;
    background: linear-gradient(135deg, rgba(74,222,128,.08), rgba(74,222,128,.03));
    border-bottom: 1px solid rgba(74,222,128,.25);
    padding: 16px 32px;
    animation: slideDown .35s ease both;
  }
  .incoming-banner.visible { display: block; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }

  .incoming-inner {
    max-width: 960px; margin: 0 auto;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .incoming-pulse {
    width: 14px; height: 14px; border-radius: 50%; background: var(--success);
    flex-shrink: 0; animation: bigPulse 1s infinite;
  }
  @keyframes bigPulse {
    0%   { box-shadow: 0 0 0 0 rgba(74,222,128,.5); }
    70%  { box-shadow: 0 0 0 10px rgba(74,222,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
  }
  .incoming-info { flex: 1; min-width: 0; }
  .incoming-title {
    font-family: var(--display); font-size: 1rem; font-weight: 800;
    color: var(--success);
  }
  .incoming-meta { font-size: .78rem; color: var(--muted); margin-top: 3px; }

  .incoming-preview {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; font-size: .78rem;
    color: var(--muted); max-width: 320px; line-height: 1.6;
  }
  .incoming-preview strong { color: var(--text); display: block; margin-bottom: 4px; font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; }

  .join-call-btn {
    padding: 11px 24px; background: var(--success); border: none;
    border-radius: 10px; color: #111; font-family: var(--display);
    font-size: .9rem; font-weight: 800; cursor: pointer;
    transition: all .2s; white-space: nowrap; text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .join-call-btn:hover { background: #22c55e; transform: scale(1.02); }

  .dismiss-btn {
    padding: 9px 16px; background: transparent; border: 1px solid var(--border);
    border-radius: 10px; color: var(--muted); font-family: var(--mono);
    font-size: .78rem; cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .dismiss-btn:hover { border-color: var(--error); color: var(--error); }

  /* ── CONTENT ── */
  .content { max-width: 960px; margin: 0 auto; padding: 36px 24px; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 14px; margin-bottom: 36px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px;
  }
  .stat-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  .stat-value { font-family: var(--display); font-size: 1.8rem; font-weight: 800; }
  .stat-value.green { color: var(--success); }
  .stat-value.amber { color: var(--warn); }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: var(--display); font-size: 1rem; font-weight: 800;
  }
  .section-meta { font-size: .72rem; color: var(--muted); }

  /* ── CALL HISTORY TABLE ── */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; margin-bottom: 36px;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th {
    padding: 12px 18px; text-align: left;
    font-size: .67rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em; font-weight: 500;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 13px 18px; font-size: .83rem; }

  .call-id-cell {
    font-family: var(--display); font-size: .82rem;
    color: var(--accent); letter-spacing: 2px;
  }
  .score-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px; font-size: .72rem; font-weight: 600;
  }
  .score-pill.high   { background: rgba(74,222,128,.12);  color: var(--success); border: 1px solid rgba(74,222,128,.2); }
  .score-pill.mid    { background: rgba(251,191,36,.12);  color: var(--warn);    border: 1px solid rgba(251,191,36,.2); }
  .score-pill.low    { background: rgba(248,113,113,.12); color: var(--error);   border: 1px solid rgba(248,113,113,.2); }
  .score-pill.na     { background: var(--surface2);       color: var(--muted);   border: 1px solid var(--border); }

  .report-link {
    font-size: .75rem; color: var(--accent); text-decoration: none;
    padding: 5px 10px; border: 1px solid rgba(124,106,247,.3);
    border-radius: 7px; transition: all .15s; white-space: nowrap;
  }
  .report-link:hover { background: var(--accent-dim); }

  .empty-row td {
    text-align: center; padding: 48px; color: var(--muted); font-size: .82rem;
  }
  .empty-icon { font-size: 2rem; margin-bottom: 10px; opacity: .3; }

  /* ── MANUALS GRID ── */
  .manuals-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px; margin-bottom: 36px;
  }
  .manual-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 16px; text-align: center;
    transition: border-color .15s;
  }
  .manual-card:hover { border-color: var(--accent); }
  .manual-card-icon  { font-size: 2rem; margin-bottom: 10px; }
  .manual-card-label { font-size: .84rem; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .manual-card-type  {
    font-size: .68rem; padding: 2px 8px; border-radius: 8px; display: inline-block;
  }
  .manual-card-type.default  { background: var(--accent-dim); color: #a89cf7; border: 1px solid rgba(124,106,247,.25); }
  .manual-card-type.uploaded { background: rgba(74,222,128,.1); color: var(--success); border: 1px solid rgba(74,222,128,.2); }

  /* ── SKELETON ── */
  .skeleton { background: var(--surface2); border-radius: 6px; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0%{opacity:.4} 50%{opacity:.9} 100%{opacity:.4} }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid rgba(74,222,128,.3);
    border-radius: 10px; padding: 12px 18px; font-size: .82rem;
    color: var(--success); opacity: 0; transform: translateY(10px);
    transition: all .3s; pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <span class="topbar-logo">GuideAI</span>
  <span class="agent-badge">🎧 Agent</span>
  <span class="online-dot"></span>
  <span class="online-label">Online</span>
  <div class="topbar-right">
    <span class="user-chip">{{ user }}</span>
    <a class="logout-btn" href="/logout">Sign Out</a>
  </div>
</div>

<!-- ── INCOMING CALL BANNER ── -->
<div class="incoming-banner" id="incoming-banner">
  <div class="incoming-inner">
    <div class="incoming-pulse"></div>
    <div class="incoming-info">
      <div class="incoming-title">📞 Incoming Support Request</div>
      <div class="incoming-meta" id="incoming-meta">Customer is waiting...</div>
    </div>
    <div class="incoming-preview" id="incoming-preview" style="display:none">
      <strong>Recent chat context</strong>
      <span id="incoming-preview-text"></span>
    </div>
    <a class="join-call-btn" id="join-call-btn" href="#">▶ Join Call</a>
    <button class="dismiss-btn" onclick="dismissIncoming()">Dismiss</button>
  </div>
</div>

<!-- ── CONTENT ── -->
<div class="content">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Calls</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg AI Score</div>
      <div class="stat-value amber" id="stat-avg">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Customer Rating</div>
      <div class="stat-value green" id="stat-rating">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Manuals Available</div>
      <div class="stat-value" id="stat-manuals">—</div>
    </div>
  </div>

  <!-- Call History -->
  <div class="section-header">
    <div class="section-title">📋 Call History</div>
    <div class="section-meta" id="history-meta"></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Call ID</th>
          <th>Date &amp; Time</th>
          <th>AI Score</th>
          <th>Customer Rating</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="history-tbody">
        <tr>
          <td colspan="5">
            <div class="skeleton" style="height:16px;width:55%;margin:10px 0"></div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Manuals -->
  <div class="section-header">
    <div class="section-title">📚 Available Manuals</div>
    <div class="section-meta" id="manuals-meta"></div>
  </div>
  <div class="manuals-grid" id="manuals-grid">
    <div class="manual-card">
      <div class="skeleton" style="height:32px;width:32px;border-radius:50%;margin:0 auto 10px"></div>
      <div class="skeleton" style="height:14px;width:70%;margin:0 auto 6px"></div>
      <div class="skeleton" style="height:12px;width:40%;margin:0 auto"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const AGENT_ID  = "{{ user }}";
const socket    = io();
let pendingCallId = null;

// ── SOCKET: come online so incoming_call events reach this page ──
socket.on('connect', () => {
  socket.emit('agent_online', { agent_id: AGENT_ID });
});

// ── RATING RECEIVED — reload history table immediately ───────────
socket.on('customer_rated', (data) => {
  // Reload the call history table so the new rating shows up instantly
  loadHistory();
  showToast(`⭐ Customer rated Call ${data.call_id}: ${data.rating}/10`);
});

// ── INCOMING CALL ────────────────────────────────────────────────
socket.on('incoming_call', (data) => {
  pendingCallId = data.call_id;

  document.getElementById('incoming-meta').textContent =
    `Customer: ${data.customer_id || 'Unknown'}  ·  Manual: ${data.manual_label}  ·  Call ID: ${data.call_id}`;

  // Show recent chat preview if available
  const preview     = data.chat_preview || [];
  const previewBox  = document.getElementById('incoming-preview');
  const previewText = document.getElementById('incoming-preview-text');

  if (preview.length) {
    previewText.innerHTML = preview.map(m =>
      `<span style="color:${m.sender === 'user' ? 'var(--text)' : 'var(--accent)'}">
        ${escapeHtml(m.message.slice(0, 80))}${m.message.length > 80 ? '…' : ''}
      </span>`
    ).join('<br>');
    previewBox.style.display = 'block';
  } else {
    previewBox.style.display = 'none';
  }

  document.getElementById('join-call-btn').href = `/call/${data.call_id}/agent`;

  const banner = document.getElementById('incoming-banner');
  banner.classList.add('visible');

  // Play a subtle alert sound using Web Audio API
  playAlertTone();
});

function dismissIncoming() {
  document.getElementById('incoming-banner').classList.remove('visible');
  pendingCallId = null;
}

function playAlertTone() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(660, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
  } catch(e) { /* Audio not available */ }
}

// ── LOAD CALL HISTORY ────────────────────────────────────────────
async function loadHistory() {
  try {
    const res  = await fetch('/call/reports');
    const data = await res.json();
    renderHistory(data.reports || []);
  } catch(e) {
    document.getElementById('history-tbody').innerHTML =
      '<tr><td colspan="5" style="padding:20px;color:var(--muted);text-align:center">Failed to load history</td></tr>';
  }
}

function scoreClass(score) {
  if (!score || score === 0) return 'na';
  if (score >= 7) return 'high';
  if (score >= 5) return 'mid';
  return 'low';
}

function renderHistory(reports) {
  const tbody   = document.getElementById('history-tbody');
  const metaEl  = document.getElementById('history-meta');

  metaEl.textContent = `${reports.length} call${reports.length !== 1 ? 's' : ''}`;

  // Stats
  const total   = reports.length;
  const scored  = reports.filter(r => r.overall_score > 0);
  const rated   = reports.filter(r => r.customer_rating > 0);
  const avgScore  = scored.length  ? (scored.reduce((s,r)  => s + r.overall_score,   0) / scored.length).toFixed(1)  : '—';
  const avgRating = rated.length   ? (rated.reduce((s,r)   => s + r.customer_rating, 0) / rated.length).toFixed(1)   : '—';

  document.getElementById('stat-total').textContent  = total;
  document.getElementById('stat-avg').textContent    = avgScore  !== '—' ? `${avgScore}/10`  : '—';
  document.getElementById('stat-rating').textContent = avgRating !== '—' ? `${avgRating}/10` : '—';

  if (!reports.length) {
    tbody.innerHTML = `
      <tr class="empty-row">
        <td colspan="5">
          <div class="empty-icon">📭</div>
          <div>No calls yet — waiting for your first customer</div>
        </td>
      </tr>`;
    return;
  }

  tbody.innerHTML = reports.map(r => {
    const dt      = new Date(r.created_at).toLocaleString([], { dateStyle:'medium', timeStyle:'short' });
    const aiClass = scoreClass(r.overall_score);
    const raClass = scoreClass(r.customer_rating);

    return `
      <tr onclick="window.location.href='/call/${r.call_id}/report'">
        <td class="call-id-cell">${r.call_id}</td>
        <td style="color:var(--muted);font-size:.78rem">${dt}</td>
        <td>
          <span class="score-pill ${aiClass}">
            ${r.overall_score > 0 ? `${r.overall_score}/10` : 'N/A'}
          </span>
        </td>
        <td>
          <span class="score-pill ${raClass}">
            ${r.customer_rating > 0 ? `${r.customer_rating}/10` : 'No rating'}
          </span>
        </td>
        <td>
          <a class="report-link" href="/call/${r.call_id}/report"
             onclick="event.stopPropagation()">View Report →</a>
        </td>
      </tr>`;
  }).join('');
}

// ── LOAD MANUALS ─────────────────────────────────────────────────
const HARDCODED = new Set(['dishwasher_manual', 'washing_machine_manual']);
const ICONS     = { dishwasher_manual: '🍽️', washing_machine_manual: '👕' };
const MANUAL_DATA = {{ manuals | tojson }};

function loadManuals() {
  const grid    = document.getElementById('manuals-grid');
  const metaEl  = document.getElementById('manuals-meta');

  metaEl.textContent         = `${MANUAL_DATA.length} manual${MANUAL_DATA.length !== 1 ? 's' : ''}`;
  document.getElementById('stat-manuals').textContent = MANUAL_DATA.length;

  if (!MANUAL_DATA.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:.82rem">No manuals loaded</div>';
    return;
  }

  grid.innerHTML = MANUAL_DATA.map(([key, label]) => {
    const isDefault = HARDCODED.has(key);
    const icon      = ICONS[key] || '📘';
    return `
      <div class="manual-card">
        <div class="manual-card-icon">${icon}</div>
        <div class="manual-card-label">${escapeHtml(label)}</div>
        <span class="manual-card-type ${isDefault ? 'default' : 'uploaded'}">
          ${isDefault ? 'Default' : 'Uploaded'}
        </span>
      </div>`;
  }).join('');
}

// ── HELPERS ──────────────────────────────────────────────────────
function escapeHtml(text) {
  return String(text)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ── INIT ─────────────────────────────────────────────────────────
loadHistory();
loadManuals();
</script>
</body>
</html>
