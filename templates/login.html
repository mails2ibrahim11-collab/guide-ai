<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GuideAI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f; --surface: #16161a; --border: #2a2a32;
    --accent: #7c6af7; --accent-dim: rgba(124,106,247,.12);
    --agent-color: #f59e0b; --agent-dim: rgba(245,158,11,.12);
    --text: #e8e8f0; --muted: #6b6b80;
    --success: #4ade80; --error: #f87171;
    --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg); color: var(--text); font-family: var(--mono);
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px; opacity: 0.35; pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.14) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    width: 100%; max-width: 440px; padding: 20px;
    position: relative; z-index: 1; animation: fadeUp .5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── LOGO ── */
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 {
    font-family: var(--display); font-size: 2.4rem; font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo p { color: var(--muted); font-size: .78rem; margin-top: 6px; letter-spacing: .08em; text-transform: uppercase; }

  /* ── ROLE SELECTOR ── */
  .role-selector {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 20px;
  }
  .role-card {
    padding: 16px 12px; border-radius: 14px;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; text-align: center; transition: all .2s;
    user-select: none;
  }
  .role-card:hover { border-color: var(--accent); }

  .role-card.active-customer {
    border-color: var(--accent);
    background: var(--accent-dim);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .role-card.active-agent {
    border-color: var(--agent-color);
    background: var(--agent-dim);
    box-shadow: 0 0 0 1px var(--agent-color);
  }

  .role-icon  { font-size: 1.8rem; margin-bottom: 8px; }
  .role-label {
    font-family: var(--display); font-size: .88rem; font-weight: 700;
    color: var(--text);
  }
  .role-desc  { font-size: .7rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }

  .role-card.active-customer .role-label { color: var(--accent); }
  .role-card.active-agent    .role-label { color: var(--agent-color); }

  /* ── CARD ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px;
    transition: border-color .3s;
  }
  .card.agent-mode { border-color: rgba(245,158,11,.35); }

  /* ── AUTH TABS (Login / Register — only shown for customer) ── */
  .auth-tabs {
    display: flex; gap: 4px; background: var(--bg);
    border-radius: 10px; padding: 4px; margin-bottom: 24px;
    transition: opacity .2s;
  }
  .auth-tabs.hidden { display: none; }

  .tab-btn {
    flex: 1; padding: 9px; border: none; border-radius: 8px; background: transparent;
    color: var(--muted); font-family: var(--mono); font-size: .82rem;
    cursor: pointer; transition: all .2s; letter-spacing: .05em;
  }
  .tab-btn.active { background: var(--accent); color: #fff; }

  /* Agent mode — override tab active colour */
  .card.agent-mode .tab-btn.active { background: var(--agent-color); }

  /* ── FORMS ── */
  .form-panel { display: none; }
  .form-panel.active { display: block; }

  .form-group { margin-bottom: 16px; }
  label {
    display: block; font-size: .72rem; color: var(--muted);
    margin-bottom: 6px; letter-spacing: .06em; text-transform: uppercase;
  }
  input {
    width: 100%; padding: 12px 14px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: var(--mono); font-size: .9rem;
    outline: none; transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); }
  .card.agent-mode input:focus { border-color: var(--agent-color); }

  /* ── AGENT NOTICE ── */
  .agent-notice {
    display: none; align-items: center; gap: 10px;
    background: var(--agent-dim); border: 1px solid rgba(245,158,11,.25);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 20px;
    font-size: .78rem; color: var(--agent-color);
  }
  .agent-notice.visible { display: flex; }
  .agent-notice-icon { font-size: 1.1rem; flex-shrink: 0; }

  /* ── BUTTON ── */
  .btn-primary {
    width: 100%; padding: 13px; background: var(--accent); border: none;
    border-radius: 10px; color: #fff; font-family: var(--display);
    font-size: .95rem; font-weight: 700; cursor: pointer;
    margin-top: 8px; transition: background .2s, transform .1s;
  }
  .btn-primary:hover  { background: #6857e8; }
  .btn-primary:active { transform: scale(.98); }
  .card.agent-mode .btn-primary { background: var(--agent-color); }
  .card.agent-mode .btn-primary:hover { background: #d97706; }

  /* ── MESSAGES ── */
  .msg {
    margin-top: 14px; padding: 10px 14px; border-radius: 8px;
    font-size: .82rem; text-align: center; display: none;
  }
  .msg.success { background: rgba(74,222,128,.1);  color: var(--success); border: 1px solid rgba(74,222,128,.2);  display: block; }
  .msg.error   { background: rgba(248,113,113,.1); color: var(--error);   border: 1px solid rgba(248,113,113,.2); display: block; }
</style>
</head>
<body>
<div class="container">

  <div class="logo">
    <h1>GuideAI</h1>
    <p>Manual Intelligence System</p>
  </div>

  <!-- ── ROLE SELECTOR ── -->
  <div class="role-selector">
    <div class="role-card active-customer" id="role-customer" onclick="selectRole('customer')">
      <div class="role-icon">👤</div>
      <div class="role-label">Customer</div>
      <div class="role-desc">Get support &amp; manage your manuals</div>
    </div>
    <div class="role-card" id="role-agent" onclick="selectRole('agent')">
      <div class="role-icon">🎧</div>
      <div class="role-label">Agent</div>
      <div class="role-desc">Monitor calls &amp; assist customers</div>
    </div>
  </div>

  <!-- ── CARD ── -->
  <div class="card" id="main-card">

    <!-- Auth tabs — Login / Register (hidden for agent) -->
    <div class="auth-tabs" id="auth-tabs">
      <button class="tab-btn active" id="tab-login"    onclick="switchTab('login')">Login</button>
      <button class="tab-btn"        id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Agent notice -->
    <div class="agent-notice" id="agent-notice">
      <span class="agent-notice-icon">🔒</span>
      <span>Agent access is restricted. Use your assigned credentials.</span>
    </div>

    <!-- Login panel (shared by both roles) -->
    <div class="form-panel active" id="panel-login">
      <div class="form-group">
        <label>User ID</label>
        <input type="text" id="login-id" placeholder="your_id" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
      <div class="msg" id="login-msg"></div>
    </div>

    <!-- Register panel (customers only) -->
    <div class="form-panel" id="panel-register">
      <div class="form-group">
        <label>Choose User ID</label>
        <input type="text" id="reg-id" placeholder="your_id"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" onclick="doRegister()">Create Account</button>
      <div class="msg" id="reg-msg"></div>
    </div>

  </div>
</div>

<script>
let currentRole = 'customer';   // 'customer' | 'agent'

// ── ROLE SELECTION ──────────────────────────────────────────────
function selectRole(role) {
  currentRole = role;

  // Role card highlight
  document.getElementById('role-customer').className =
    'role-card' + (role === 'customer' ? ' active-customer' : '');
  document.getElementById('role-agent').className =
    'role-card' + (role === 'agent' ? ' active-agent' : '');

  // Card colour mode
  document.getElementById('main-card').classList.toggle('agent-mode', role === 'agent');

  // Auth tabs — hidden for agent (no register)
  document.getElementById('auth-tabs').classList.toggle('hidden', role === 'agent');

  // Agent notice
  document.getElementById('agent-notice').classList.toggle('visible', role === 'agent');

  // Always show login panel when switching role
  switchTab('login');

  // Focus ID field
  setTimeout(() => document.getElementById('login-id').focus(), 100);
}

// ── TAB SWITCH ──────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('panel-login').classList.toggle('active',    tab === 'login');
  document.getElementById('panel-register').classList.toggle('active', tab === 'register');
}

// ── MESSAGE HELPER ──────────────────────────────────────────────
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className   = 'msg ' + type;
}

// ── LOGIN ───────────────────────────────────────────────────────
async function doLogin() {
  const id   = document.getElementById('login-id').value.trim();
  const pass = document.getElementById('login-pass').value.trim();

  if (!id || !pass) return showMsg('login-msg', 'Please fill in all fields.', 'error');

  const btn = document.getElementById('login-btn');
  btn.disabled    = true;
  btn.textContent = 'Signing in...';

  try {
    const res  = await fetch('/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ unique_id: id, password: pass, role: currentRole })
    });
    const data = await res.json();

    if (data.success) {
      showMsg('login-msg', 'Welcome back!', 'success');
      setTimeout(() => window.location.href = '/dashboard', 600);
    } else {
      showMsg('login-msg', data.error || 'Invalid credentials.', 'error');
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  } catch (e) {
    showMsg('login-msg', 'Network error. Please try again.', 'error');
    btn.disabled    = false;
    btn.textContent = 'Sign In';
  }
}

// ── REGISTER (customers only) ───────────────────────────────────
async function doRegister() {
  const id   = document.getElementById('reg-id').value.trim();
  const pass = document.getElementById('reg-pass').value.trim();

  if (!id || !pass) return showMsg('reg-msg', 'Please fill in all fields.', 'error');

  const res  = await fetch('/register', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ unique_id: id, password: pass })
  });
  const data = await res.json();

  if (data.success) {
    showMsg('reg-msg', 'Account created! Switching to login...', 'success');
    setTimeout(() => {
      switchTab('login');
      document.getElementById('login-id').value = id;
      setTimeout(() => document.getElementById('login-pass').focus(), 100);
    }, 1000);
  } else {
    showMsg('reg-msg', data.error || 'Username already taken.', 'error');
  }
}

// ── KEYBOARD ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const activePanel = document.querySelector('.form-panel.active').id;
  if (activePanel === 'panel-login')    doLogin();
  if (activePanel === 'panel-register') doRegister();
});
</script>
</body>
</html>
