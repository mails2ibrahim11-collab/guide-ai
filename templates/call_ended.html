<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GuideAI — Call Ended</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0d0d0f; --surface: #16161a; --border: #2a2a32; --accent: #7c6af7; --text: #e8e8f0; --muted: #6b6b80; --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 48px 40px; text-align: center; max-width: 400px; }
  .icon { font-size: 3rem; margin-bottom: 16px; }
  h1 { font-family: var(--display); font-size: 1.4rem; margin-bottom: 8px; }
  p  { color: var(--muted); font-size: .82rem; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📵</div>
  <h1>Call Has Ended</h1>
  <p>This support session is no longer active.</p>
</div>
</body>
</html>
